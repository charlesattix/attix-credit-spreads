name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: pip install ruff
      - name: Lint Python
        run: ruff check . --select E,F,W --ignore E501,E402
      - run: pip install pip-audit
      - name: Security audit (Python)
        run: pip-audit --strict --ignore-vuln PYSEC-2024-100
      - name: Run Python tests
        run: python -m pytest tests/ -v --ignore=tests/test_macro_api.py --cov=strategy --cov=ml --cov=alerts --cov=shared --cov=backtest --cov=tracker --cov-fail-under=50 --cov-report=term-missing --cov-report=xml:coverage.xml
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-coverage
          path: coverage.xml

  web-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - run: cd web && npm ci
      - name: Security audit (npm)
        run: cd web && npm audit --audit-level=high
      - name: Run web tests
        run: cd web && npx vitest run --coverage.enabled --coverage.reporter=text --coverage.reporter=lcov
      - name: Build web app
        run: cd web && npm run build
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: web-coverage
          path: web/coverage/

  docker-build:
    needs: [python-tests, web-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t attix-credit-spreads .

  deploy-gate:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [python-tests, web-tests, docker-build]
    runs-on: ubuntu-latest
    steps:
      - name: All checks passed
        run: echo "All CI checks passed — Python tests, web tests, Docker build verified. Safe for Railway auto-deploy."

  post-deploy-smoke:
    # Runs only on push to main, after the deploy gate. Railway auto-deploys on
    # the same push; the smoke script retries to give the new revision time to
    # come up, then asserts the live dashboard is not silently regressed
    # (lost Alpaca keys, broken live injection, or a $0 combined equity).
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [deploy-gate]
    runs-on: ubuntu-latest
    env:
      DASHBOARD_URL: ${{ vars.DASHBOARD_URL || 'https://attix-production.up.railway.app' }}
    steps:
      - uses: actions/checkout@v4
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Smoke test live dashboard health
        run: bash scripts/smoke_dashboard.sh "$DASHBOARD_URL"
