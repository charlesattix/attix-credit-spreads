# compass/orchestrator/canonical_params.yaml
# ═══════════════════════════════════════════════════════════════════════════
# Frozen per-sleeve parameters — the single source of truth that every
# live intent (EXP-2690) is checked against. Changes require PR review.
#
# Each sleeve declares the parameters that were locked at backtest time:
#   structure / delta / dte / width / risk_per_trade_pct / max_contracts ...
#
# Gate 3 of the entry_gate compares incoming SignalIntent against these
# records using the per-field tolerances declared in `defaults` (or the
# per-sleeve override). Drift beyond tolerance → BLOCK.
#
# Source-of-truth EXP ids live in `source:` so any reviewer can trace
# a value back to the backtest run.
# ═══════════════════════════════════════════════════════════════════════════

version: 1
generated: 2026-05-22

# ── Default tolerances + sleeve defaults (overridable per-sleeve) ──────
defaults:
  delta_tol: 0.05              # |signal.delta − canonical.delta|
  dte_tol: 4                   # |signal.dte   − canonical.dte|   (days)
  width_tol: 1.0               # |signal.width − canonical.width| (dollars)
  risk_per_trade_pct: 0.02     # 2% of equity at risk per spread
  max_contracts: 5
  vix_block: 40.0
  profit_target: 0.50          # close at 50% of max profit
  stop_mult: 2.0               # stop at 2× credit collected
  min_spacing_days: 7
  liquidity_oi_floor: 50

# ── Portfolio-level invariants (used by position_sizer) ────────────────
portfolio:
  port_risk_cap_pct: 0.20      # gross dollar-at-risk ≤ 20% of equity
  corr_threshold: 0.50         # apply haircut when avg ρ to book > 0.50
  corr_min_scale: 0.50         # haircut never reduces size below 50%

