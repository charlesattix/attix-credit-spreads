# ============================================================================
# paper_exp3311.yaml — EXP-3311 NFP Entry Filter (Paper)
# ============================================================================
# Strategy: Champion regime-adaptive CS+IC on SPY, with day-before-NFP gating
#
# Hypothesis (from EXP-3311 backtest):
#   Skipping entries the day before Non-Farm Payrolls announcements protects
#   against payroll-vol spikes and reduces max drawdown.
#   Expected: Net Sharpe 4.984, Max DD 5.89%, CAGR 84.8%.
#
# Caveat: Backtest used compass.events algorithmic NFP dates. Live deployment
# uses BLS-published dates from configs/event_blacklist.json (verified
# 2026-05-21; quarterly re-verification recommended).
#
# Usage:
#   python main.py scheduler --config configs/paper_exp3311.yaml \
#                            --env-file .env.exp3311
# ============================================================================

# --- Paper trading safety flags ---
paper_mode: true
db_path: "data/pilotai_exp3311.db"
experiment_id: "EXP-3311"
created_by: "maximus"

# Tickers
tickers:
  - SPY

# ============================================================================
# Entry Gate (EXP-3311 new feature)
# ============================================================================
entry_gate:
  nfp_filter: true
  blacklist_path: "configs/event_blacklist.json"

# ============================================================================
# Credit Spread Strategy (inherited from paper_champion.yaml)
# ============================================================================
strategy:
  # --- DTE ---
  min_dte: 15
  max_dte: 25
  target_dte: 15

  manage_dte: 0           # DISABLED — matches backtester (no early DTE exit)

  # --- Direction: regime-adaptive (bull put in bull, bear call in bear) ---
  direction: both

  # --- Strike selection ---
  otm_pct: 0.02            # 2% OTM
  use_delta_selection: false
  target_delta: 0.12
  min_delta: 0.08
  max_delta: 0.18

  # --- Spread construction ---
  spread_width: 12
  spread_width_high_iv: 12
  spread_width_low_iv: 12

  # --- IV filters ---
  min_iv_rank: 0
  min_iv_percentile: 0

  # --- Iron Condor ---
  iron_condor:
    enabled: true
    rsi_min: 35
    rsi_max: 60
    min_iv_rank: 45.0
    target_dte: 30
    min_dte: 20
    otm_pct_put: 0.04
    otm_pct_call: 0.03
    spread_width: 12
    min_combined_credit_pct: 0.25
    profit_target_pct: 0.30
    stop_loss_multiplier: 2.5
    max_risk_pct: 3.5

  # --- Technical filters ---
  technical:
    use_trend_filter: true
    use_rsi_filter: false
    use_support_resistance: false
    fast_ma: 50
    slow_ma: 80
    rsi_period: 14
    rsi_oversold: 30
    rsi_overbought: 70

  # --- Regime detection ---
  regime_mode: combo
  regime_config:
    signals:
      - price_vs_ma200
      - rsi_momentum
      - vix_structure
    ma_slow_period: 80
    ma200_neutral_band_pct: 0.5

# ============================================================================
# Risk Management
# ============================================================================
risk:
  account_size: 100000
  max_risk_per_trade: 8.5
  sizing_mode: flat
  compound: false
  min_contracts: 1
  max_contracts: 25
  max_positions: 10
  max_positions_per_ticker: 2
  scan_days: [0, 1, 2, 3, 4]
  profit_target: 55
  stop_loss_multiplier: 1.25
  stop_loss_pct_of_width: 90
  momentum_filter_pct: 2.0
  portfolio_risk:
    max_portfolio_risk_pct: 40
    max_single_ticker_pct: 40
    max_same_expiration: 4
  drawdown_cb_pct: 40
  cooldown_bars: 3
  enable_rolling: false
  max_rolls_per_position: 0

# ============================================================================
# Alpaca Paper Trading
# ============================================================================
alpaca:
  enabled: true
  paper: true
  base_url: "https://paper-api.alpaca.markets"
  api_key: "${ALPACA_API_KEY}"
  api_secret: "${ALPACA_API_SECRET}"

# ============================================================================
# Alerts
# ============================================================================
alerts:
  output_json: true
  output_text: true
  output_csv: true
  json_file: "alerts_exp3311.json"
  text_file: "alerts_exp3311.txt"
  csv_file: "alerts_exp3311.csv"
  telegram:
    enabled: true
    bot_token: "${TELEGRAM_BOT_TOKEN}"
    chat_id: "${TELEGRAM_CHAT_ID}"

# ============================================================================
# Logging
# ============================================================================
logging:
  level: "INFO"
  file: "logs/paper_exp3311.log"
  console: true

# ============================================================================
# Data
# ============================================================================
data:
  provider: polygon
  cache_dir: "data/options_cache"
  polygon:
    api_key: "${POLYGON_API_KEY}"

# ============================================================================
# Backtester Reference
# ============================================================================
backtest:
  starting_capital: 100000
  commission_per_contract: 0.65
  slippage: 0.05
  exit_slippage: 0.10
  score_threshold: 25
  generate_reports: true
  report_dir: "output/backtest_reports"
