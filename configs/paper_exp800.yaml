# ============================================================================
# paper_exp800.yaml — EXP-800 Safe Kelly 4/7/9 Paper Trading Config
# ============================================================================
# Strategy: EXP-400 champion signal generation (dte=15, otm=2%, width=$12,
#           sl=1.25x, pt=55%) with Safe Kelly criterion position sizing and
#           3-tier portfolio drawdown circuit breakers.
#
# Kelly fractions (% of current equity at risk per trade):
#   bull  regime → 9%  (highest conviction, directional bull puts)
#   neutral regime → 7%  (moderate, iron condors)
#   bear  regime → 4%  (defensive, directional bear calls)
#
# Circuit breakers (portfolio drawdown from rolling equity high-water mark):
#   Tier 1: DD ≤ -8%  → halve sizing (0.5× Kelly fraction)
#   Tier 2: DD ≤ -10% → minimum sizing (2% floor fraction)
#   Tier 3: DD ≤ -12% → flatten open positions + halt new entries for 30 trades
#           Recover  when DD rises above -7%
#
# Kelly state (HWM, CB tier, halt counter) persisted in:
#   data/exp800/pilotai_exp800.db  (table: kelly_state)
#
# Account: Dedicated Alpaca paper account (see .env.exp800)
# Baseline: EXP-700 (flat 8.5% risk + ML filter) — EXP-800 adds dynamic sizing
#
# Usage:
#   python scripts/exp800_safe_kelly_scanner.py --config configs/paper_exp800.yaml \
#                                               --env-file .env.exp800
#   # One-shot scan; run via cron at 10:00 ET on trading days.
#
# Required env vars (in .env.exp800):
#   ALPACA_API_KEY       — Alpaca paper trading API key
#   ALPACA_API_SECRET    — Alpaca paper trading API secret
#   TELEGRAM_BOT_TOKEN   — (optional) Telegram alerts
#   TELEGRAM_CHAT_ID     — (optional) Telegram chat ID
# ============================================================================

paper_mode: true
experiment_id: "EXP-800"
db_path: "data/exp800/pilotai_exp800.db"
created_by: "charles"

tickers:
  - SPY

# ============================================================================
# Strategy — EXP-400 champion params (identical to EXP-700)
# ============================================================================
strategy:
  target_dte: 15
  min_dte: 15
  max_dte: 25

  direction: both             # regime selects bull_put vs bear_call vs iron_condor

  otm_pct: 0.02               # 2% out-of-the-money
  use_delta_selection: false

  spread_width: 12            # $12 wide spreads

  iron_condor:
    enabled: true             # used in neutral regime only
    risk_per_trade: 7.0       # overridden by Kelly neutral fraction at runtime

  regime_mode: combo
  regime_config:
    signals:
      - price_vs_ma200
      - rsi_momentum
      - vix_structure
    ma_slow_period: 80
    ma200_neutral_band_pct: 0.5
    rsi_period: 14
    rsi_bull_threshold: 50.0
    rsi_bear_threshold: 45.0
    vix_structure_bull: 0.95
    vix_structure_bear: 1.05
    bear_requires_unanimous: true
    cooldown_days: 3
    vix_extreme: 40.0
    vix_extreme_regime: NEUTRAL

  momentum_filter_pct: 2.0

# ============================================================================
# Safe Kelly 4/7/9 — the core addition vs EXP-400 / EXP-700
# ============================================================================
kelly:
  # Risk fraction (% of current equity) per regime
  regime_fractions:
    bull:    9.0    # highest conviction — directional bull puts
    neutral: 7.0    # moderate — iron condors
    bear:    4.0    # defensive — directional bear calls

  # Sizing base: "current_equity" compounds gains/losses into size
  sizing_base: current_equity

  # 3-tier circuit breakers (% portfolio drawdown from rolling HWM)
  circuit_breakers:
    tier1_dd:        -8.0   # DD ≤ -8%  → apply 0.5× multiplier to Kelly fraction
    tier2_dd:       -10.0   # DD ≤ -10% → floor to min_fraction
    tier3_dd:       -12.0   # DD ≤ -12% → halt new entries for tier3_halt_trades
    min_fraction:    2.0    # minimum risk % when Tier 2 active (floor, not zero)
    tier3_halt_trades: 30   # trade slots skipped after Tier 3 trigger
    recovery_dd:    -7.0    # DD must recover above this to exit Tier 2 pause

# ============================================================================
# Risk Management (non-Kelly limits — hard caps applied after Kelly sizing)
# ============================================================================
risk:
  account_size: 100000       # starting capital (used for HWM bootstrap)
  max_risk_per_trade: 17.0    # hard cap (matches max Kelly bull fraction)
  max_contracts: 30          # hard cap regardless of Kelly size
  max_positions: 10

  profit_target: 55          # 55% of credit
  stop_loss_multiplier: 1.25

  min_credit_pct: 5          # minimum credit as % of spread width

  vix_max_entry: 40          # block entries above VIX 40

  portfolio_risk:
    max_portfolio_risk_pct: 60
    max_single_ticker_pct: 40
    max_same_expiration: 4

# ============================================================================
# Alpaca Paper Trading
# ============================================================================
alpaca:
  enabled: true
  paper: true
  base_url: "https://paper-api.alpaca.markets"
  api_key: "${ALPACA_API_KEY}"
  api_secret: "${ALPACA_API_SECRET}"

# ============================================================================
# Alerts / Logging
# ============================================================================
alerts:
  telegram:
    enabled: true
    bot_token: "${TELEGRAM_BOT_TOKEN}"
    chat_id: "${TELEGRAM_CHAT_ID}"

logging:
  level: "INFO"
  file: "logs/exp800_scanner.log"
  console: true

# ============================================================================
# Data
# ============================================================================
data:
  provider: polygon
  cache_dir: "data/options_cache"
  polygon:
    api_key: "${POLYGON_API_KEY}"
