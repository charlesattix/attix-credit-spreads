# ═══════════════════════════════════════════════════════════════════════════
# EXP-1220 Paper Trading — 5× Static Leverage (MAXIMUM SWEEP POINT)
# ═══════════════════════════════════════════════════════════════════════════
#
# Part of the 2x/3x/4x/5x leverage sweep. This is the most aggressive
# config in the sweep and is INTENDED for paper-only stress testing.
#
# HONEST WARNING — 5x leverage on credit spreads:
#   - Max loss per trade is still capped (defined-risk structure)
#   - BUT portfolio heat can exceed 20% on correlated moves
#   - Fill quality degradation is non-linear at this size
#   - A single 10% adverse spread move = 50% account DD
#   - Auto-halt triggers at 20% DD (hard stop)
#
# This config exists ONLY to observe behavior at the upper extreme.
# Do NOT run on any live account. Do NOT recommend without 8 weeks of
# paper validation showing the halt/recovery logic actually works.
#
# Projected (extrapolated, high uncertainty): CAGR ~325%, Max DD ~35-45%
# ═══════════════════════════════════════════════════════════════════════════

name: "EXP-1220 Paper Trading — 5× Static Leverage (STRESS SWEEP)"
version: "1.0.0"
mode: paper
created: "2026-04-06"
leverage_sweep_id: "5x"

account:
  broker: alpaca
  environment: paper
  starting_capital: 100000
  currency: USD
  margin_type: reg_t

instrument:
  ticker: SPY
  asset_class: options
  strategy_type: bull_put_spread
  fallback_type: bear_call_spread

leverage:
  mode: static
  multiplier: 5.0
  dynamic_leverage: false
  hedge_overlay: false

cadence:
  frequency: 7d
  scan_day: monday
  scan_time: "09:35"
  max_concurrent: 3              # only 3 concurrent at 5x
  min_spacing_days: 7            # widest spacing — reduce correlation

sizing:
  base_risk_pct: 1.0
  leveraged_risk_pct: 5.0       # 5% risk per trade
  max_portfolio_risk_pct: 20.0  # hard cap on aggregate
  contracts_min: 1
  contracts_max: 30
  # Example: $100K account, 5% risk = $5,000 per trade
  # $5 spread, ~$4.50 max loss → 10 contracts ($4,500 risk)

spread:
  width: 5.0
  target_dte: 30
  min_dte: 24                   # avoid gamma cliff
  max_dte: 40
  otm_pct: 0.06                 # slightly further OTM — richer premium
  min_credit: 0.40              # demand significant credit
  min_credit_pct: 0.08

# MOST restrictive entry filters in the sweep
entry_signals:
  vix_max_entry: 28.0           # skip entries when VIX > 28
  vix_min_entry: 13.0           # require meaningful VIX
  ts_max_ratio: 1.08            # very tight term structure
  trend_filter: true
  trend_ma_period: 20

# Tightest exits — bank profit fast, cut losses fast
exits:
  profit_target_pct: 35         # earliest take-profit
  stop_loss_multiplier: 1.5     # tightest stop
  max_hold_days: 12
  dte_exit: 6
  vix_emergency_exit: 38

# Hard halt at 20% DD — this is the circuit breaker
risk:
  # Position-sizing fields read by alerts/alert_position_sizer.py.
  # Mirrors `sizing:` above (legacy aliases). Keep both in sync.
  max_risk_per_trade: 5.0       # 5% of starting_capital per trade
  max_contracts: 30
  min_contracts: 1
  sizing_mode: flat             # base = backtest.starting_capital
  max_daily_loss_pct: 7.0
  max_weekly_loss_pct: 13.0
  max_drawdown_halt_pct: 20.0
  drawdown_recovery_pct: 10.0
  correlation_check: true

backtest:
  starting_capital: 100000

monitoring:
  check_interval_minutes: 5     # most frequent checks at 5x
  daily_report_time: "16:05"
  alert_channels:
    - telegram
  alerts:
    position_opened: true
    position_closed: true
    stop_loss_hit: true
    profit_target_hit: true
    vix_spike_above: 22         # earliest warning
    daily_loss_above_pct: 4.0
    drawdown_above_pct: 12.0

data:
  price_source: alpaca
  vix_source: yahoo
  options_source: alpaca
  historical_cache: data/options_cache.db

logging:
  level: INFO
  file: logs/paper_exp1220_5x.log
  max_size_mb: 50
  backup_count: 5
  trade_journal: logs/paper_exp1220_5x_trade_journal.csv

rule_zero:
  enforced: true
  statement: |
    ZERO SYNTHETIC DATA. All quotes via Alpaca + Yahoo. No np.random.
