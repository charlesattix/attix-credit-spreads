# ═══════════════════════════════════════════════════════════════════════════
# EXP-1220 Paper Trading — 3× Static Leverage
# ═══════════════════════════════════════════════════════════════════════════
#
# Part of the 2x/3x/4x/5x leverage sweep. At 3x, the defined-risk structure
# still protects against catastrophic loss (max loss is capped by spread
# width) but unrealized volatility scales 2x vs the 1.5x baseline.
#
# Projected (extrapolated from 1.5x validated): CAGR ~195%, Max DD ~22%
# Real paper result is the point of this sweep — extrapolation is suspect.
# ═══════════════════════════════════════════════════════════════════════════

name: "EXP-1220 Paper Trading — 3× Static Leverage"
version: "1.0.0"
mode: paper
created: "2026-04-06"
leverage_sweep_id: "3x"

account:
  broker: alpaca
  environment: paper
  starting_capital: 100000
  currency: USD
  margin_type: reg_t

instrument:
  ticker: SPY
  asset_class: options
  strategy_type: bull_put_spread
  fallback_type: bear_call_spread

leverage:
  mode: static
  multiplier: 3.0
  dynamic_leverage: false
  hedge_overlay: false

cadence:
  frequency: 7d
  scan_day: monday
  scan_time: "09:35"
  max_concurrent: 5
  min_spacing_days: 5

sizing:
  base_risk_pct: 1.0
  leveraged_risk_pct: 3.0      # 3% risk per trade
  max_portfolio_risk_pct: 14.0 # vs 10% at 2x
  contracts_min: 1
  contracts_max: 20
  # Example: $100K account, 3% risk = $3,000 per trade
  # $5 spread, ~$4.50 max loss → 6 contracts ($2,700 risk)

spread:
  width: 5.0
  target_dte: 30
  min_dte: 21
  max_dte: 45
  otm_pct: 0.05
  min_credit: 0.30
  min_credit_pct: 0.06

entry_signals:
  vix_max_entry: 32.0           # tighter than 1.5x (35) — more conservative at high leverage
  vix_min_entry: 10.0
  ts_max_ratio: 1.12            # tighter term structure filter
  trend_filter: true
  trend_ma_period: 20

exits:
  profit_target_pct: 45         # take profit sooner at higher leverage
  stop_loss_multiplier: 1.8     # tighter stop
  max_hold_days: 18
  dte_exit: 5
  vix_emergency_exit: 42

# DD halt scales up but stays well below 1.5x actual max DD × 2
risk:
  # Position-sizing fields read by alerts/alert_position_sizer.py.
  # Mirrors `sizing:` above (legacy aliases). Keep both in sync.
  max_risk_per_trade: 3.0       # 3% of starting_capital per trade
  max_contracts: 20
  min_contracts: 1
  sizing_mode: flat             # base = backtest.starting_capital
  max_daily_loss_pct: 5.0
  max_weekly_loss_pct: 9.0
  max_drawdown_halt_pct: 16.0
  drawdown_recovery_pct: 8.0
  correlation_check: true

backtest:
  starting_capital: 100000

monitoring:
  check_interval_minutes: 15
  daily_report_time: "16:05"
  alert_channels:
    - telegram
  alerts:
    position_opened: true
    position_closed: true
    stop_loss_hit: true
    profit_target_hit: true
    vix_spike_above: 26         # earlier warning
    daily_loss_above_pct: 3.0
    drawdown_above_pct: 8.0

data:
  price_source: alpaca
  vix_source: yahoo
  options_source: alpaca
  historical_cache: data/options_cache.db

logging:
  level: INFO
  file: logs/paper_exp1220_3x.log
  max_size_mb: 50
  backup_count: 5
  trade_journal: logs/paper_exp1220_3x_trade_journal.csv

rule_zero:
  enforced: true
  statement: |
    ZERO SYNTHETIC DATA. All quotes via Alpaca + Yahoo. No np.random.
