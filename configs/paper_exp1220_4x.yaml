# ═══════════════════════════════════════════════════════════════════════════
# EXP-1220 Paper Trading — 4× Static Leverage
# ═══════════════════════════════════════════════════════════════════════════
#
# Part of the 2x/3x/4x/5x leverage sweep. At 4x, intra-day volatility
# starts to approach the pain threshold. Defined-risk spreads still cap
# per-trade loss, but aggregate portfolio risk can reach 15-18% on a bad
# day. This config tightens entry filters significantly.
#
# HONEST WARNING: 4x leverage extrapolation from 1.5x is unreliable.
# If the 1.5x CAGR was 99%, linear scaling suggests 264% — but real
# execution will have non-linear drag (fill quality degrades when you're
# trading 4x the size). Paper trade this to learn the real curve.
#
# Projected (extrapolated): CAGR ~260%, Max DD ~28-32%
# ═══════════════════════════════════════════════════════════════════════════

name: "EXP-1220 Paper Trading — 4× Static Leverage"
version: "1.0.0"
mode: paper
created: "2026-04-06"
leverage_sweep_id: "4x"

account:
  broker: alpaca
  environment: paper
  starting_capital: 100000
  currency: USD
  margin_type: reg_t

instrument:
  ticker: SPY
  asset_class: options
  strategy_type: bull_put_spread
  fallback_type: bear_call_spread

leverage:
  mode: static
  multiplier: 4.0
  dynamic_leverage: false
  hedge_overlay: false

cadence:
  frequency: 7d
  scan_day: monday
  scan_time: "09:35"
  max_concurrent: 4              # fewer concurrent positions at high lev
  min_spacing_days: 6            # wider spacing to reduce correlation

sizing:
  base_risk_pct: 1.0
  leveraged_risk_pct: 4.0       # 4% risk per trade
  max_portfolio_risk_pct: 18.0  # vs 14% at 3x
  contracts_min: 1
  contracts_max: 25
  # Example: $100K account, 4% risk = $4,000 per trade
  # $5 spread, ~$4.50 max loss → 8 contracts ($3,600 risk)

spread:
  width: 5.0
  target_dte: 30
  min_dte: 21
  max_dte: 40                   # tighter DTE ceiling
  otm_pct: 0.05
  min_credit: 0.35              # require richer credits
  min_credit_pct: 0.07

# Tighter entry filters at 4x — fewer, higher-quality trades
entry_signals:
  vix_max_entry: 30.0           # skip entries when VIX > 30
  vix_min_entry: 12.0           # require minimum VIX for adequate premium
  ts_max_ratio: 1.10            # tight term structure filter
  trend_filter: true
  trend_ma_period: 20

exits:
  profit_target_pct: 40         # take profit sooner
  stop_loss_multiplier: 1.6     # tight stop
  max_hold_days: 15
  dte_exit: 5
  vix_emergency_exit: 40

# DD halt at 18% — hard cap on leverage risk
risk:
  # Position-sizing fields read by alerts/alert_position_sizer.py.
  # Mirrors `sizing:` above (legacy aliases). Keep both in sync.
  max_risk_per_trade: 4.0       # 4% of starting_capital per trade
  max_contracts: 25
  min_contracts: 1
  sizing_mode: flat             # base = backtest.starting_capital
  max_daily_loss_pct: 6.0
  max_weekly_loss_pct: 11.0
  max_drawdown_halt_pct: 18.0
  drawdown_recovery_pct: 9.0
  correlation_check: true

backtest:
  starting_capital: 100000

monitoring:
  check_interval_minutes: 10    # more frequent checks at high lev
  daily_report_time: "16:05"
  alert_channels:
    - telegram
  alerts:
    position_opened: true
    position_closed: true
    stop_loss_hit: true
    profit_target_hit: true
    vix_spike_above: 24         # very early warning
    daily_loss_above_pct: 3.5
    drawdown_above_pct: 10.0

data:
  price_source: alpaca
  vix_source: yahoo
  options_source: alpaca
  historical_cache: data/options_cache.db

logging:
  level: INFO
  file: logs/paper_exp1220_4x.log
  max_size_mb: 50
  backup_count: 5
  trade_journal: logs/paper_exp1220_4x_trade_journal.csv

rule_zero:
  enforced: true
  statement: |
    ZERO SYNTHETIC DATA. All quotes via Alpaca + Yahoo. No np.random.
