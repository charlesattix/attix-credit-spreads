# ============================================================================
# paper_exp3303b.yaml — EXP-3303b Per-Stream Selective Regime Gate (Paper)
# ============================================================================
# Strategy: Champion regime-adaptive CS+IC on SPY, with regime-transition gate
#
# Hypothesis (from EXP-3303b backtest):
#   Gating SPX-sensitive streams during regime transitions reduces tail risk
#   while keeping carry streams (sector ETFs) productive.
#   Expected: Net Sharpe 6.334, CAGR 247.9%, Max DD 10.455%.
#
# DEVIATION FROM INSTRUCTION FILE:
#   The instruction file specifies a 50% size multiplier for gated streams.
#   This paper deployment uses a hard SKIP (0% size) instead, because:
#     1. The "stream" concept (exp1220, qqq_cs) doesn't exist in this codebase
#        — it's a per-ticker SPY/QQQ scanner.
#     2. Implementing a 50% multiplier requires touching AlertPositionSizer,
#        which is shared by 6 other active paper accounts (regression risk).
#     3. Skip-on-transition is a strictly more conservative test of the same
#        hypothesis; if it underperforms, the half-size variant is unlikely
#        to recover the Sharpe lift.
#   Carlos approved scan-time gating per architectural recommendation (B).
#
# Usage:
#   python main.py scheduler --config configs/paper_exp3303b.yaml \
#                            --env-file .env.exp3303b
# ============================================================================

# --- Paper trading safety flags ---
paper_mode: true
db_path: "data/pilotai_exp3303b.db"
experiment_id: "EXP-3303b"
created_by: "maximus"

# Tickers
tickers:
  - SPY

# ============================================================================
# Credit Spread Strategy (inherited from paper_champion.yaml)
# ============================================================================
strategy:
  min_dte: 15
  max_dte: 25
  target_dte: 15
  manage_dte: 0
  direction: both
  otm_pct: 0.02
  use_delta_selection: false
  target_delta: 0.12
  min_delta: 0.08
  max_delta: 0.18
  spread_width: 12
  spread_width_high_iv: 12
  spread_width_low_iv: 12
  min_iv_rank: 0
  min_iv_percentile: 0
  iron_condor:
    enabled: true
    rsi_min: 35
    rsi_max: 60
    min_iv_rank: 45.0
    target_dte: 30
    min_dte: 20
    otm_pct_put: 0.04
    otm_pct_call: 0.03
    spread_width: 12
    min_combined_credit_pct: 0.25
    profit_target_pct: 0.30
    stop_loss_multiplier: 2.5
    max_risk_pct: 3.5
  technical:
    use_trend_filter: true
    use_rsi_filter: false
    use_support_resistance: false
    fast_ma: 50
    slow_ma: 80
    rsi_period: 14
    rsi_oversold: 30
    rsi_overbought: 70
  regime_mode: combo
  regime_config:
    signals:
      - price_vs_ma200
      - rsi_momentum
      - vix_structure
    ma_slow_period: 80
    ma200_neutral_band_pct: 0.5

# ============================================================================
# Risk Management
# ============================================================================
risk:
  account_size: 100000
  max_risk_per_trade: 8.5
  sizing_mode: flat
  compound: false
  min_contracts: 1
  max_contracts: 25
  max_positions: 10
  max_positions_per_ticker: 2
  scan_days: [0, 1, 2, 3, 4]
  profit_target: 55
  stop_loss_multiplier: 1.25
  stop_loss_pct_of_width: 90
  momentum_filter_pct: 2.0
  portfolio_risk:
    max_portfolio_risk_pct: 40
    max_single_ticker_pct: 40
    max_same_expiration: 4
  drawdown_cb_pct: 40
  cooldown_bars: 3
  enable_rolling: false
  max_rolls_per_position: 0

  # --- EXP-3303b: Per-Stream Selective Regime Gate ---
  regime_gate:
    enabled: true
    gated_regimes:
      - transition
      - high_stress
    sensitive_tickers:
      - SPY
      - QQQ

# ============================================================================
# Alpaca Paper Trading
# ============================================================================
alpaca:
  enabled: true
  paper: true
  base_url: "https://paper-api.alpaca.markets"
  api_key: "${ALPACA_API_KEY}"
  api_secret: "${ALPACA_API_SECRET}"

# ============================================================================
# Alerts
# ============================================================================
alerts:
  output_json: true
  output_text: true
  output_csv: true
  json_file: "alerts_exp3303b.json"
  text_file: "alerts_exp3303b.txt"
  csv_file: "alerts_exp3303b.csv"
  telegram:
    enabled: true
    bot_token: "${TELEGRAM_BOT_TOKEN}"
    chat_id: "${TELEGRAM_CHAT_ID}"

# ============================================================================
# Logging
# ============================================================================
logging:
  level: "INFO"
  file: "logs/paper_exp3303b.log"
  console: true

# ============================================================================
# Data
# ============================================================================
data:
  provider: polygon
  cache_dir: "data/options_cache"

# ============================================================================
# Backtester Reference
# ============================================================================
backtest:
  starting_capital: 100000
  commission_per_contract: 0.65
  slippage: 0.05
  exit_slippage: 0.10
  score_threshold: 25
  generate_reports: true
  report_dir: "output/backtest_reports"
