[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = --cov=strategy --cov=ml --cov=alerts --cov=shared --cov=backtest --cov=tracker --cov=compass --cov=execution --cov-fail-under=40 --cov-report=term-missing
         --cov-config=.coveragerc
         --ignore=tests/archive
